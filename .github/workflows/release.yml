name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3)'
        required: true
        type: string
      prerelease:
        description: 'Is this a prerelease?'
        required: false
        default: false
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      releases: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag or input
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}" | sed 's/^v//' >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          # Generate changelog
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" $PREVIOUS_TAG..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)")
          fi
          
          # Save changelog to file
          echo "$CHANGELOG" > CHANGELOG.md
          echo "chelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release Notes
        run: |
          cat > release-notes.md << 'EOF'
          ## 🚀 Release ${{ steps.version.outputs.version }}
          
          ### 📦 Installation
          ```bash
          npm install @ankh-studio/copilot-eval-plugin@${{ steps.version.outputs.version }}
          ```
          
          ### 📋 Changes
          ${{ steps.changelog.outputs.chelog }}
          
          ### 🔗 Links
          - [GitHub Repository](https://github.com/Ankh-Studio/copilot-eval-plugin)
          - [npm Package](https://www.npmjs.com/package/@ankh-studio/copilot-eval-plugin)
          - [Documentation](https://github.com/Ankh-Studio/copilot-eval-plugin#readme)
          EOF

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: Version ${{ steps.version.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ github.event.inputs.prerelease || 'false' }}

      - name: Update latest tag
        if: github.event.inputs.prerelease != 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -f latest
          git push origin -f latest

      - name: Release summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Type**: ${{ github.event.inputs.prerelease == 'true' && 'Prerelease' || 'Release' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Changelog**: Generated from git commits" >> $GITHUB_STEP_SUMMARY
          echo "- **Installation**: \`npm install @ankh-studio/copilot-eval-plugin@${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
